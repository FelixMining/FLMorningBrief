<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FL Morning Brief</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Montserrat:wght@700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:         #080A0F;
      --surface:    #0D1117;
      --card:       #0F1724;
      --border:     #1C2333;
      --text:       #EDF2FF;
      --text-2:     #8B9CC8;
      --text-3:     #3D4A60;
      --accent:     #00D4FF;
      --accent-dim: rgba(0,212,255,.08);
      --accent-mid: rgba(0,212,255,.2);
      --green:      #10B981;
      --green-dim:  rgba(16,185,129,.12);
      --red:        #F43F5E;
      --red-dim:    rgba(244,63,94,.08);
      --amber:      #F59E0B;
      --purple:     #8B5CF6;
      --h: 'Montserrat', system-ui, sans-serif;
      --s: 'Inter', system-ui, sans-serif;
      --m: 'JetBrains Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--s);
      background: var(--bg); color: var(--text);
      min-height: 100vh; -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,.018) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none; z-index: 0;
    }
    .wrap { max-width: 480px; margin: 0 auto; padding: 0 20px 64px; position: relative; }

    /* ── Streak ───────────────────────────────── */
    .streak-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; margin-bottom: 16px;
      animation: fadeUp .3s ease both;
    }
    .streak-icon { font-size: 20px; line-height: 1; }
    .streak-count {
      font-family: var(--h); font-size: 22px; font-weight: 900;
      color: var(--amber); letter-spacing: -.02em;
    }
    .streak-label {
      font-family: var(--m); font-size: 11px; color: var(--text-3);
      letter-spacing: .04em;
    }
    .streak-bar.zero .streak-count { color: var(--text-3); }

    /* ── Masthead ─────────────────────────────── */
    .masthead {
      padding: 32px 0 28px; position: relative;
      border-bottom: 1px solid var(--border); margin-bottom: 28px;
      animation: fadeUp .45s ease both;
    }
    .masthead::after {
      content: ''; position: absolute; bottom: -1px; left: 0;
      width: 56px; height: 1px;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent), 0 0 20px rgba(0,212,255,.3);
    }
    .masthead-eyebrow {
      font-family: var(--m); font-size: 10px; letter-spacing: .2em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 14px; opacity: .65;
    }
    .masthead-title {
      font-family: var(--h); font-size: clamp(34px,8vw,48px); font-weight: 900;
      color: var(--text); letter-spacing: -.03em; line-height: .95; margin-bottom: 8px;
    }
    .masthead-subtitle {
      font-family: var(--m); font-size: 11px; color: var(--text-3); letter-spacing: .06em;
    }
    .gear-btn {
      position: absolute; top: 32px; right: 0;
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
      color: var(--text-3); text-decoration: none;
      border: 1px solid var(--border); background: var(--surface);
      border-radius: 7px; transition: color .15s, border-color .15s;
    }
    .gear-btn:hover { color: var(--accent); border-color: var(--accent-mid); }
    .gear-btn svg { width: 14px; height: 14px; }

    /* ── Dateline ─────────────────────────────── */
    .dateline {
      font-family: var(--m); font-size: 11px; color: var(--text-3);
      letter-spacing: .12em; text-transform: uppercase; margin-bottom: 16px;
      animation: fadeUp .45s .1s ease both;
    }

    /* ── Hero ─────────────────────────────────── */
    .hero {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; padding: 20px; margin-bottom: 36px;
      position: relative; overflow: hidden;
      animation: fadeUp .45s .15s ease both;
    }
    .hero::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, var(--accent) 0%, transparent 65%);
    }
    .hero.read { border-color: rgba(16,185,129,.35); }
    .hero.read::before { background: linear-gradient(90deg, var(--green) 0%, transparent 65%); }
    .hero-label {
      font-family: var(--m); font-size: 10px; letter-spacing: .18em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 10px; opacity: .7;
    }
    .hero.read .hero-label { color: var(--green); }
    .hero-date {
      font-family: var(--h); font-size: clamp(18px,5vw,24px); font-weight: 800;
      color: var(--text); letter-spacing: -.02em; line-height: 1.2;
      margin-bottom: 16px; min-height: 28px;
    }
    .hero-cta {
      display: block; width: 100%; background: var(--accent); color: #080A0F;
      text-align: center; text-decoration: none; font-family: var(--h);
      font-size: 14px; font-weight: 800; padding: 12px 20px; border-radius: 6px;
      letter-spacing: .08em; text-transform: uppercase;
      transition: box-shadow .15s, opacity .15s; margin-bottom: 12px;
      box-shadow: 0 0 20px rgba(0,212,255,.25);
    }
    .hero-cta:hover { box-shadow: 0 0 32px rgba(0,212,255,.45); opacity: .92; }
    .hero.read .hero-cta {
      background: var(--green); box-shadow: 0 0 20px rgba(16,185,129,.25);
    }
    .hero.read .hero-cta:hover { box-shadow: 0 0 32px rgba(16,185,129,.45); }
    .hero-cta.unavailable {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text-3); box-shadow: none; cursor: default;
    }
    .hero-cta.unavailable:hover { box-shadow: none; opacity: 1; }
    .hero-status {
      display: flex; align-items: center; gap: 7px;
      font-family: var(--m); font-size: 11px; color: var(--text-3);
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green); box-shadow: 0 0 6px var(--green); flex-shrink: 0;
    }
    .status-dot.pending { background: var(--text-3); box-shadow: none; }
    .hero-meta {
      margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border);
      font-family: var(--m); font-size: 10px; color: var(--text-3);
      display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    }
    .hero-meta .meta-item { display: flex; align-items: center; gap: 4px; }
    .hero-meta .meta-cost { color: var(--green); opacity: .8; }
    .skel-line {
      height: 24px; width: 65%;
      background: linear-gradient(90deg, var(--border) 25%, #263045 50%, var(--border) 75%);
      background-size: 200% 100%; animation: shimmer 1.4s infinite;
      border-radius: 4px; margin-bottom: 16px;
    }

    /* ── Archive ──────────────────────────────── */
    .archive-header {
      display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
      animation: fadeUp .45s .25s ease both;
    }
    .archive-title {
      font-family: var(--h); font-size: 12px; font-weight: 900;
      letter-spacing: .14em; text-transform: uppercase; color: var(--text); white-space: nowrap;
    }
    .archive-divider { flex: 1; height: 1px; background: var(--border); }
    .archive-list { animation: fadeUp .45s .3s ease both; }
    .archive-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 10px; border-bottom: 1px solid var(--border);
      border-radius: 4px; text-decoration: none; color: var(--text-2);
      transition: color .15s, background .15s; cursor: pointer; margin-bottom: 2px;
    }
    .archive-row:first-child { border-top: 1px solid var(--border); }
    .archive-row:hover { color: var(--text); background: rgba(0,212,255,.03); }
    /* Couleurs selon statut lecture */
    .archive-row.read {
      background: var(--green-dim); border-color: rgba(16,185,129,.2);
      color: #6EE7B7;
    }
    .archive-row.read:hover { background: rgba(16,185,129,.2); }
    .archive-row.unread {
      background: var(--red-dim); border-color: rgba(244,63,94,.15);
      color: #FDA4AF;
    }
    .archive-row.unread:hover { background: rgba(244,63,94,.12); }
    .archive-row-date { font-family: var(--m); font-size: 13px; letter-spacing: .02em; }
    .archive-row-time { font-family: var(--m); font-size: 10px; opacity: .6; margin-right: 4px; }
    .archive-row-arrow { font-size: 12px; color: var(--text-3); transition: color .15s, transform .15s; }
    .archive-row:hover .archive-row-arrow { color: var(--accent); transform: translateX(3px); }
    .archive-row.read .archive-row-arrow { color: var(--green); opacity: .7; }
    .archive-row.unread .archive-row-arrow { color: var(--red); opacity: .7; }
    .archive-more {
      display: block; text-align: right; font-family: var(--m); font-size: 11px;
      color: var(--text-3); text-decoration: none; padding-top: 12px;
      transition: color .15s; letter-spacing: .04em;
      animation: fadeUp .45s .35s ease both;
    }
    .archive-more:hover { color: var(--accent); }
    .archive-error {
      padding: 18px 0; font-family: var(--m); font-size: 12px;
      color: var(--text-3); text-align: center;
    }
    .skel-row { padding: 11px 0; border-bottom: 1px solid var(--border); }
    .skel-row:first-child { border-top: 1px solid var(--border); }
    .skel-text {
      height: 13px; border-radius: 3px;
      background: linear-gradient(90deg, var(--border) 25%, #263045 50%, var(--border) 75%);
      background-size: 200% 100%; animation: shimmer 1.4s infinite;
    }

    /* ── Stats table ─────────────────────────── */
    .stats-section { margin-top: 36px; animation: fadeUp .45s .38s ease both; }
    .stats-legend {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 0 4px; font-family: var(--m);
      font-size: 10px; letter-spacing: .08em; text-transform: uppercase;
    }
    .stats-leg { padding: 1px 8px; border-radius: 4px; }
    .stats-leg.date { flex: 1; color: var(--text-3); }
    .stats-leg.culture { background: rgba(139,92,246,.1); border: 1px solid rgba(139,92,246,.25); color: #A78BFA; }
    .stats-leg.actu    { background: rgba(0,212,255,.08); border: 1px solid rgba(0,212,255,.2); color: var(--accent); }
    .stats-leg.time    { color: var(--text-3); min-width: 40px; text-align: right; }
    .stats-row {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 0; border-bottom: 1px solid var(--border);
    }
    .stats-row:first-child { border-top: 1px solid var(--border); }
    .stats-row-date { flex: 1; font-family: var(--m); font-size: 12px; color: var(--text-2); }
    .stats-score {
      font-family: var(--m); font-size: 11px; padding: 2px 8px;
      border-radius: 4px; min-width: 38px; text-align: center;
    }
    .stats-score.culture { background: rgba(139,92,246,.1); border: 1px solid rgba(139,92,246,.25); color: #A78BFA; }
    .stats-score.actu    { background: rgba(0,212,255,.08); border: 1px solid rgba(0,212,255,.2); color: var(--accent); }
    .stats-time-val { font-family: var(--m); font-size: 11px; color: var(--text-3); min-width: 40px; text-align: right; }
    .stats-empty { padding: 14px 0; font-family: var(--m); font-size: 11px; color: var(--text-3); text-align: center; }

    /* ── Graphe scores ───────────────────────── */
    .scores-chart { margin-top: 20px; animation: fadeUp .45s .42s ease both; }
    .chart-canvas-wrap {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; padding: 16px; overflow: hidden;
    }
    .chart-labels {
      display: flex; justify-content: space-between;
      font-family: var(--m); font-size: 9px; color: var(--text-3);
      margin-top: 8px; letter-spacing: .04em;
    }

    /* ── Footer ───────────────────────────────── */
    footer {
      margin-top: 40px; padding-top: 18px; border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      animation: fadeUp .45s .4s ease both;
    }
    .footer-name { font-family: var(--m); font-size: 11px; letter-spacing: .1em; color: var(--text-3); text-transform: uppercase; }
    .footer-gear {
      display: flex; align-items: center; gap: 6px; font-family: var(--m);
      font-size: 11px; color: var(--text-3); text-decoration: none;
      transition: color .15s; letter-spacing: .04em;
    }
    .footer-gear:hover { color: var(--accent); }
    .footer-gear svg { width: 12px; height: 12px; }

    /* ── Animations ──────────────────────────── */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body>
<div class="wrap">

  <!-- ── Streak ───────────────────────────────────── -->
  <div class="streak-bar zero" id="streak-bar">
    <span class="streak-icon">🔥</span>
    <span class="streak-count" id="streak-count">0</span>
    <span class="streak-label" id="streak-label">jours de suite</span>
  </div>

  <!-- ── Masthead ─────────────────────────────── -->
  <header class="masthead">
    <a href="dashboard.html" class="gear-btn" title="Configuration">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4">
        <circle cx="8" cy="8" r="2.5"/>
        <path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M3.2 3.2l1.1 1.1M11.7 11.7l1.1 1.1M3.2 12.8l1.1-1.1M11.7 4.3l1.1-1.1"/>
      </svg>
    </a>
    <div class="masthead-eyebrow">Édition quotidienne</div>
    <div class="masthead-title">FL Morning Brief</div>
    <div class="masthead-subtitle">brief matinal automatisé</div>
  </header>

  <!-- ── Dateline ──────────────────────────────── -->
  <div class="dateline" id="dateline">Chargement…</div>

  <!-- ── Hero ─────────────────────────────────── -->
  <section class="hero" id="hero-section">
    <div class="hero-label" id="hero-label">Édition du jour</div>
    <div class="hero-date" id="hero-date"><div class="skel-line"></div></div>
    <a class="hero-cta unavailable" id="hero-cta" href="#" onclick="return false">Chargement…</a>
    <div class="hero-status" id="hero-status">
      <div class="status-dot pending"></div>
      <span>Vérification…</span>
    </div>
    <div class="hero-meta" id="hero-meta" style="display:none"></div>
  </section>

  <!-- ── Archive ───────────────────────────────── -->
  <section>
    <div class="archive-header">
      <h2 class="archive-title">Éditions précédentes</h2>
      <div class="archive-divider"></div>
    </div>
    <div class="archive-list" id="archive-list">
      <div class="skel-row"><div class="skel-text" style="width:62%"></div></div>
      <div class="skel-row"><div class="skel-text" style="width:55%"></div></div>
      <div class="skel-row"><div class="skel-text" style="width:68%"></div></div>
      <div class="skel-row"><div class="skel-text" style="width:58%"></div></div>
    </div>
    <a href="briefs/index.html" class="archive-more" id="archive-more" style="display:none">
      Voir toutes les éditions →
    </a>
  </section>

  <!-- ── Stats QCM & Temps ─────────────────────── -->
  <section class="stats-section" id="stats-section" style="display:none">
    <div class="archive-header">
      <h2 class="archive-title">Performance</h2>
      <div class="archive-divider"></div>
    </div>
    <div class="stats-legend">
      <span class="stats-leg date">Édition</span>
      <span class="stats-leg culture">Culture</span>
      <span class="stats-leg actu">Actu</span>
      <span class="stats-leg time">Durée</span>
    </div>
    <div id="stats-content"></div>
  </section>

  <!-- ── Graphe scores ──────────────────────────── -->
  <section class="scores-chart" id="scores-chart" style="display:none">
    <div class="archive-header" style="margin-top:20px">
      <h2 class="archive-title">Progression</h2>
      <div class="archive-divider"></div>
    </div>
    <div class="chart-canvas-wrap">
      <canvas id="scores-canvas" height="90"></canvas>
      <div class="chart-labels" id="chart-labels"></div>
    </div>
  </section>

  <!-- ── Footer ───────────────────────────────── -->
  <footer>
    <span class="footer-name">FL Morning Brief</span>
    <a href="dashboard.html" class="footer-gear">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4">
        <circle cx="8" cy="8" r="2.5"/>
        <path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M3.2 3.2l1.1 1.1M11.7 11.7l1.1 1.1M3.2 12.8l1.1-1.1M11.7 4.3l1.1-1.1"/>
      </svg>
      Configuration
    </a>
  </footer>

</div>

<script>
  const BASE        = 'https://felixmining.github.io/FLMorningBrief/briefs/';
  const API         = 'https://api.github.com/repos/FelixMining/FLMorningBrief/contents/briefs';
  const META_URL    = BASE + 'latest_meta.json';
  const MAX_ARCHIVE = 10;
  const READ_THRESHOLD_S = 300; // 5 minutes

  // ── Helpers ────────────────────────────────────
  function formatDateFR(dateStr) {
    const d    = new Date(dateStr + 'T12:00:00');
    const jours = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
    const mois  = ['janvier','février','mars','avril','mai','juin',
                   'juillet','août','septembre','octobre','novembre','décembre'];
    return `${jours[d.getDay()]} ${d.getDate()} ${mois[d.getMonth()]} ${d.getFullYear()}`;
  }

  function formatDateShort(dateStr) {
    const d    = new Date(dateStr + 'T12:00:00');
    const mois = ['jan.','fév.','mars','avr.','mai','juin',
                  'juil.','août','sept.','oct.','nov.','déc.'];
    return `${d.getDate()} ${mois[d.getMonth()]}`;
  }

  function today() { return new Date().toLocaleDateString('sv-SE'); }

  function fmtTime(s) {
    const m = Math.floor(s / 60), sc = s % 60;
    return m + ':' + (sc < 10 ? '0' : '') + sc;
  }

  function getStats() {
    try { return JSON.parse(localStorage.getItem('flmb_stats') || '{}'); }
    catch(e) { return {}; }
  }

  function isRead(dateStr) {
    const s = getStats();
    return s[dateStr] && s[dateStr].reading && s[dateStr].reading.total_seconds >= READ_THRESHOLD_S;
  }

  // ── Dateline ───────────────────────────────────
  function renderDateline() {
    const d     = new Date();
    const jours = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
    const mois  = ['janvier','février','mars','avril','mai','juin',
                   'juillet','août','septembre','octobre','novembre','décembre'];
    document.getElementById('dateline').textContent =
      `${jours[d.getDay()]} ${d.getDate()} ${mois[d.getMonth()]} ${d.getFullYear()}`;
  }

  // ── Streak ─────────────────────────────────────
  function computeStreak() {
    const stats = getStats();
    let streak  = 0;
    const d = new Date();
    // Vérifier depuis aujourd'hui en remontant
    for (let i = 0; i < 365; i++) {
      const dateStr = d.toLocaleDateString('sv-SE');
      if (stats[dateStr] && stats[dateStr].reading &&
          stats[dateStr].reading.total_seconds >= READ_THRESHOLD_S) {
        streak++;
        d.setDate(d.getDate() - 1);
      } else if (i === 0) {
        // Aujourd'hui pas encore lu — ne casse pas la streak (on vérifie hier)
        d.setDate(d.getDate() - 1);
      } else {
        break;
      }
    }
    return streak;
  }

  function renderStreak() {
    const streak  = computeStreak();
    const bar     = document.getElementById('streak-bar');
    const countEl = document.getElementById('streak-count');
    const labelEl = document.getElementById('streak-label');
    countEl.textContent = streak;
    labelEl.textContent = streak === 1 ? 'jour de suite' : 'jours de suite';
    if (streak > 0) bar.classList.remove('zero');
  }

  // ── Hero ───────────────────────────────────────
  function renderHero(briefs, meta) {
    const t        = today();
    const hasToday = briefs.length > 0 && briefs[0] === t;
    const dateEl   = document.getElementById('hero-date');
    const ctaEl    = document.getElementById('hero-cta');
    const statusEl = document.getElementById('hero-status');
    const heroSec  = document.getElementById('hero-section');
    const labelEl  = document.getElementById('hero-label');
    const metaEl   = document.getElementById('hero-meta');

    dateEl.textContent = formatDateFR(t);

    if (hasToday) {
      ctaEl.href      = BASE + t + '.html';
      ctaEl.onclick   = null;

      if (isRead(t)) {
        heroSec.classList.add('read');
        ctaEl.classList.remove('unavailable');
        ctaEl.textContent = 'Lire de nouveau →';
        labelEl.textContent = 'Lu aujourd\'hui';
        statusEl.innerHTML = `<div class="status-dot"></div><span>Brief lu (${fmtTime(getStats()[t].reading.total_seconds)})</span>`;
      } else {
        ctaEl.classList.remove('unavailable');
        ctaEl.textContent = 'Lire le brief →';
        statusEl.innerHTML = `<div class="status-dot"></div><span>Brief disponible</span>`;
      }
    } else {
      ctaEl.textContent = 'Disponible à 06h00';
      ctaEl.classList.add('unavailable');
      ctaEl.onclick = () => false;
      statusEl.innerHTML = `<div class="status-dot pending"></div><span>Prochain brief généré automatiquement à 06h00</span>`;
    }

    // Méta de génération
    if (meta && meta.date === t) {
      metaEl.style.display = 'flex';
      const dur = meta.duration_seconds ? `${meta.duration_seconds}s` : '';
      metaEl.innerHTML =
        `<span class="meta-item">⏱ ${meta.generated_at_start} → ${meta.generated_at_end}${dur ? ' ('+dur+')' : ''}</span>` +
        `<span class="meta-item">${meta.tokens_in || 0} → ${meta.tokens_out || 0} tokens</span>` +
        `<span class="meta-item meta-cost">\$${(meta.cost_usd||0).toFixed(4)}</span>`;
    }
  }

  // ── Archive ────────────────────────────────────
  function renderArchive(briefs) {
    const t       = today();
    const past    = briefs.filter(b => b !== t);
    const shown   = past.slice(0, MAX_ARCHIVE);
    const listEl  = document.getElementById('archive-list');
    const moreEl  = document.getElementById('archive-more');

    if (shown.length === 0) {
      listEl.innerHTML = '<div class="archive-error">Aucune édition précédente.</div>';
      return;
    }

    listEl.innerHTML = shown.map(function(dateStr) {
      const stats  = getStats();
      const entry  = stats[dateStr];
      const secs   = entry && entry.reading ? entry.reading.total_seconds : 0;
      const read   = secs >= READ_THRESHOLD_S;
      // passé = brief d'un jour terminé (pas aujourd'hui)
      const cls    = read ? 'read' : 'unread';
      const timeStr = secs > 0 ? fmtTime(secs) : '';
      return `<a class="archive-row ${cls}" href="${BASE}${dateStr}.html" target="_blank" rel="noopener">
        <span class="archive-row-date">${formatDateFR(dateStr)}</span>
        <span style="display:flex;align-items:center;gap:6px">
          ${timeStr ? `<span class="archive-row-time">${timeStr}</span>` : ''}
          <span class="archive-row-arrow">→</span>
        </span>
      </a>`;
    }).join('');

    if (past.length > MAX_ARCHIVE) moreEl.style.display = 'block';
  }

  // ── Stats table ────────────────────────────────
  function renderStats() {
    const raw = localStorage.getItem('flmb_stats');
    if (!raw) return;
    let stats;
    try { stats = JSON.parse(raw); } catch(e) { return; }
    const dates = Object.keys(stats).sort().reverse().slice(0, 7);
    if (dates.length === 0) return;

    document.getElementById('stats-section').style.display = 'block';
    const content = document.getElementById('stats-content');
    content.innerHTML = dates.map(function(d) {
      const entry = stats[d];
      const cult  = entry.culture ? entry.culture.correct + '/' + entry.culture.total : '—';
      const actu  = entry.actu    ? entry.actu.correct    + '/' + entry.actu.total    : '—';
      const time  = entry.reading ? fmtTime(entry.reading.total_seconds)              : '—';
      return '<div class="stats-row">'
        + '<span class="stats-row-date">' + formatDateShort(d) + '</span>'
        + '<span class="stats-score culture">' + cult + '</span>'
        + '<span class="stats-score actu">'    + actu + '</span>'
        + '<span class="stats-time-val">'      + time + '</span>'
        + '</div>';
    }).join('');
  }

  // ── Graphe scores ──────────────────────────────
  function renderScoresChart() {
    const raw = localStorage.getItem('flmb_stats');
    if (!raw) return;
    let stats;
    try { stats = JSON.parse(raw); } catch(e) { return; }
    const dates = Object.keys(stats).sort().slice(-14); // 14 derniers jours
    if (dates.length < 2) return;

    document.getElementById('scores-chart').style.display = 'block';
    const canvas = document.getElementById('scores-canvas');
    const labels = document.getElementById('chart-labels');
    const W = canvas.offsetWidth || 440;
    const H = 90;
    canvas.width  = W;
    canvas.height = H;

    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, W, H);

    const pad  = { l: 8, r: 8, t: 8, b: 4 };
    const cW   = W - pad.l - pad.r;
    const cH   = H - pad.t - pad.b;
    const step = cW / Math.max(dates.length - 1, 1);

    function scorePct(entry, key) {
      const s = entry && entry[key];
      if (!s || !s.total) return null;
      return s.correct / s.total;
    }

    function drawLine(color, data, dashedPoints) {
      ctx.beginPath();
      ctx.strokeStyle = color;
      ctx.lineWidth   = 1.5;
      ctx.lineJoin    = 'round';
      let first = true;
      data.forEach(function(v, i) {
        if (v === null) return;
        const x = pad.l + i * step;
        const y = pad.t + (1 - v) * cH;
        if (first) { ctx.moveTo(x, y); first = false; }
        else { ctx.lineTo(x, y); }
      });
      ctx.stroke();

      // Dots
      data.forEach(function(v, i) {
        if (v === null) return;
        const x = pad.l + i * step;
        const y = pad.t + (1 - v) * cH;
        ctx.beginPath();
        ctx.arc(x, y, 3, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
      });
    }

    // Grille
    ctx.strokeStyle = 'rgba(28,35,51,.8)';
    ctx.lineWidth = 1;
    [0, 0.5, 1].forEach(function(v) {
      const y = pad.t + (1 - v) * cH;
      ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W - pad.r, y); ctx.stroke();
    });

    const cultData = dates.map(d => scorePct(stats[d], 'culture'));
    const actuData = dates.map(d => scorePct(stats[d], 'actu'));

    drawLine('#A78BFA', cultData);
    drawLine('#00D4FF', actuData);

    // Labels x (seulement premier et dernier)
    labels.innerHTML = '';
    const firstSpan = document.createElement('span');
    firstSpan.textContent = formatDateShort(dates[0]);
    const lastSpan = document.createElement('span');
    lastSpan.textContent  = formatDateShort(dates[dates.length - 1]);
    labels.appendChild(firstSpan);
    labels.appendChild(lastSpan);
  }

  // ── Sync feedback vers GitHub (si PAT dispo) ────
  function syncFeedback() {
    const pat = localStorage.getItem('flmb_pat');
    if (!pat) return;
    const feedbackRaw = localStorage.getItem('flmb_feedback');
    if (!feedbackRaw) return;
    const OWNER = 'FelixMining', REPO = 'FLMorningBrief', PATH = 'briefs/feedback.json';
    const apiUrl = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`;
    fetch(apiUrl, { headers: { Authorization: `token ${pat}` } })
      .then(r => r.ok ? r.json() : null)
      .then(function(existing) {
        let merged = {};
        if (existing && existing.content) {
          try { merged = JSON.parse(atob(existing.content.replace(/\n/g,''))); } catch(e) {}
        }
        const local = JSON.parse(feedbackRaw);
        // Fusionner (local écrase pour les dates concernées)
        Object.assign(merged, local);
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(merged, null, 2))));
        return fetch(apiUrl, {
          method: 'PUT',
          headers: { Authorization: `token ${pat}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: 'sync: feedback utilisateur',
            content: content,
            sha: existing ? existing.sha : undefined,
          })
        });
      })
      .catch(function() {}); // silencieux
  }

  // ── Main ───────────────────────────────────────
  renderDateline();
  renderStreak();
  renderStats();
  renderScoresChart();

  // Fetch briefs + méta en parallèle
  const fetchBriefs = fetch(API)
    .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
    .then(function(files) {
      return files
        .filter(f => /^\d{4}-\d{2}-\d{2}\.html$/.test(f.name))
        .map(f => f.name.replace('.html', ''))
        .sort().reverse();
    });

  const fetchMeta = fetch(META_URL)
    .then(r => r.ok ? r.json() : null)
    .catch(function() { return null; });

  Promise.all([fetchBriefs, fetchMeta])
    .then(function(results) {
      const briefs = results[0];
      const meta   = results[1];
      renderHero(briefs, meta);
      renderArchive(briefs);
    })
    .catch(function(err) {
      console.warn('API error:', err);
      const t = today();
      document.getElementById('hero-date').textContent = formatDateFR(t);
      const cta = document.getElementById('hero-cta');
      cta.href = BASE + t + '.html';
      cta.textContent = 'Lire le brief →';
      cta.classList.remove('unavailable');
      cta.onclick = null;
      document.getElementById('hero-status').innerHTML =
        `<div class="status-dot pending"></div><span>Impossible de vérifier le statut</span>`;
      document.getElementById('archive-list').innerHTML =
        '<div class="archive-error">Impossible de charger les éditions précédentes.</div>';
    });

  // Sync feedback en arrière-plan
  setTimeout(syncFeedback, 2000);
</script>
