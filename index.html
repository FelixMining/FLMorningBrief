<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FL Morning Brief</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Montserrat:wght@700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:         #080A0F;
      --surface:    #0D1117;
      --card:       #0F1724;
      --border:     #1C2333;
      --text:       #EDF2FF;
      --text-2:     #8B9CC8;
      --text-3:     #3D4A60;
      --accent:     #00D4FF;
      --accent-dim: rgba(0,212,255,.08);
      --accent-mid: rgba(0,212,255,.2);
      --green:      #10B981;
      --h: 'Montserrat', system-ui, sans-serif;
      --s: 'Inter', system-ui, sans-serif;
      --m: 'JetBrains Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--s);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* Subtle grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,.018) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 20px 64px;
      position: relative;
    }

    /* ── Masthead ─────────────────────────────── */
    .masthead {
      padding: 48px 0 32px;
      position: relative;
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
      animation: fadeUp .45s ease both;
    }
    .masthead::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0;
      width: 56px; height: 1px;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent), 0 0 20px rgba(0,212,255,.3);
    }

    .masthead-eyebrow {
      font-family: var(--m);
      font-size: 10px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 18px;
      opacity: .65;
    }

    .masthead-title {
      font-family: var(--h);
      font-size: clamp(36px, 9vw, 52px);
      font-weight: 900;
      color: var(--text);
      letter-spacing: -.03em;
      line-height: .95;
      margin-bottom: 10px;
    }

    .masthead-subtitle {
      font-family: var(--m);
      font-size: 11px;
      color: var(--text-3);
      letter-spacing: .06em;
    }

    /* Config button top-right */
    .gear-btn {
      position: absolute;
      top: 48px; right: 0;
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-3);
      text-decoration: none;
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 7px;
      transition: color .15s, border-color .15s;
    }
    .gear-btn:hover { color: var(--accent); border-color: var(--accent-mid); }
    .gear-btn svg { width: 14px; height: 14px; }

    /* ── Dateline ─────────────────────────────── */
    .dateline {
      font-family: var(--m);
      font-size: 11px;
      color: var(--text-3);
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-bottom: 20px;
      animation: fadeUp .45s .1s ease both;
    }

    /* ── Hero ─────────────────────────────────── */
    .hero {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 22px 20px;
      margin-bottom: 40px;
      position: relative;
      overflow: hidden;
      animation: fadeUp .45s .15s ease both;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, var(--accent) 0%, transparent 65%);
    }

    .hero-label {
      font-family: var(--m);
      font-size: 10px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
      opacity: .7;
    }

    .hero-date {
      font-family: var(--h);
      font-size: clamp(20px, 5vw, 26px);
      font-weight: 800;
      color: var(--text);
      letter-spacing: -.02em;
      line-height: 1.2;
      margin-bottom: 20px;
      min-height: 32px;
    }

    .hero-cta {
      display: block;
      width: 100%;
      background: var(--accent);
      color: #080A0F;
      text-align: center;
      text-decoration: none;
      font-family: var(--h);
      font-size: 14px;
      font-weight: 800;
      padding: 14px 20px;
      border-radius: 6px;
      letter-spacing: .08em;
      text-transform: uppercase;
      transition: box-shadow .15s, opacity .15s;
      margin-bottom: 14px;
      box-shadow: 0 0 20px rgba(0,212,255,.25);
    }
    .hero-cta:hover { box-shadow: 0 0 32px rgba(0,212,255,.45); opacity: .92; }
    .hero-cta:active { opacity: .85; }

    .hero-cta.unavailable {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-3);
      box-shadow: none;
      cursor: default;
    }
    .hero-cta.unavailable:hover { box-shadow: none; opacity: 1; }

    .hero-status {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: var(--m);
      font-size: 11px;
      color: var(--text-3);
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      flex-shrink: 0;
    }
    .status-dot.pending { background: var(--text-3); box-shadow: none; }

    /* Skeleton */
    .skel-line {
      height: 26px;
      width: 70%;
      background: linear-gradient(90deg, var(--border) 25%, #263045 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 4px;
      margin-bottom: 20px;
    }

    /* ── Archive ──────────────────────────────── */
    .archive-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      animation: fadeUp .45s .25s ease both;
    }
    .archive-title {
      font-family: var(--h);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--text);
      white-space: nowrap;
    }
    .archive-divider {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .archive-list { animation: fadeUp .45s .3s ease both; }

    .archive-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: var(--text-2);
      transition: color .15s, padding-left .15s;
      cursor: pointer;
    }
    .archive-row:first-child { border-top: 1px solid var(--border); }
    .archive-row:hover { color: var(--text); padding-left: 4px; }

    .archive-row-date {
      font-family: var(--m);
      font-size: 13px;
      letter-spacing: .02em;
    }
    .archive-row-arrow {
      font-size: 12px;
      color: var(--text-3);
      transition: color .15s, transform .15s;
    }
    .archive-row:hover .archive-row-arrow {
      color: var(--accent);
      transform: translateX(3px);
    }

    /* Skeleton rows */
    .skel-row {
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .skel-row:first-child { border-top: 1px solid var(--border); }
    .skel-text {
      height: 13px;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--border) 25%, #263045 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }

    .archive-more {
      display: block;
      text-align: right;
      font-family: var(--m);
      font-size: 11px;
      color: var(--text-3);
      text-decoration: none;
      padding-top: 14px;
      transition: color .15s;
      letter-spacing: .04em;
      animation: fadeUp .45s .35s ease both;
    }
    .archive-more:hover { color: var(--accent); }

    .archive-error {
      padding: 20px 0;
      font-family: var(--m);
      font-size: 12px;
      color: var(--text-3);
      text-align: center;
    }

    /* ── Footer ───────────────────────────────── */
    footer {
      margin-top: 48px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      animation: fadeUp .45s .4s ease both;
    }
    .footer-name {
      font-family: var(--m);
      font-size: 11px;
      letter-spacing: .1em;
      color: var(--text-3);
      text-transform: uppercase;
    }
    .footer-gear {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--m);
      font-size: 11px;
      color: var(--text-3);
      text-decoration: none;
      transition: color .15s;
      letter-spacing: .04em;
    }
    .footer-gear:hover { color: var(--accent); }
    .footer-gear svg { width: 12px; height: 12px; }

    /* ── Animations ───────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <!-- ── Masthead ─────────────────────────────── -->
  <header class="masthead">
    <a href="dashboard.html" class="gear-btn" title="Configuration">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4">
        <circle cx="8" cy="8" r="2.5"/>
        <path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M3.2 3.2l1.1 1.1M11.7 11.7l1.1 1.1M3.2 12.8l1.1-1.1M11.7 4.3l1.1-1.1"/>
      </svg>
    </a>
    <div class="masthead-eyebrow">Édition quotidienne</div>
    <div class="masthead-title">FL Morning Brief</div>
    <div class="masthead-subtitle">brief matinal automatisé</div>
  </header>

  <!-- ── Dateline ──────────────────────────────── -->
  <div class="dateline" id="dateline">Chargement…</div>

  <!-- ── Hero ─────────────────────────────────── -->
  <section class="hero">
    <div class="hero-label">Édition du jour</div>
    <div class="hero-date" id="hero-date">
      <div class="skel-line"></div>
    </div>
    <a class="hero-cta unavailable" id="hero-cta" href="#" onclick="return false">
      Chargement…
    </a>
    <div class="hero-status" id="hero-status">
      <div class="status-dot pending"></div>
      <span>Vérification…</span>
    </div>
  </section>

  <!-- ── Archive ───────────────────────────────── -->
  <section>
    <div class="archive-header">
      <h2 class="archive-title">Éditions précédentes</h2>
      <div class="archive-divider"></div>
    </div>

    <div class="archive-list" id="archive-list">
      <div class="skel-row"><div class="skel-text" style="width:62%"></div></div>
      <div class="skel-row"><div class="skel-text" style="width:55%"></div></div>
      <div class="skel-row"><div class="skel-text" style="width:68%"></div></div>
      <div class="skel-row"><div class="skel-text" style="width:58%"></div></div>
    </div>

    <a href="briefs/index.html" class="archive-more" id="archive-more" style="display:none">
      Voir toutes les éditions →
    </a>
  </section>

  <!-- ── Footer ───────────────────────────────── -->
  <footer>
    <span class="footer-name">FL Morning Brief</span>
    <a href="dashboard.html" class="footer-gear">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4">
        <circle cx="8" cy="8" r="2.5"/>
        <path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M3.2 3.2l1.1 1.1M11.7 11.7l1.1 1.1M3.2 12.8l1.1-1.1M11.7 4.3l1.1-1.1"/>
      </svg>
      Configuration
    </a>
  </footer>

</div>

<script>
  const BASE   = 'https://felixmining.github.io/FLMorningBrief/briefs/';
  const API    = 'https://api.github.com/repos/FelixMining/FLMorningBrief/contents/briefs';
  const MAX_ARCHIVE = 10;

  // ── Helpers ────────────────────────────────────
  function formatDateFR(dateStr) {
    const d = new Date(dateStr + 'T12:00:00');
    const jours = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
    const mois  = ['janvier','février','mars','avril','mai','juin',
                   'juillet','août','septembre','octobre','novembre','décembre'];
    return `${jours[d.getDay()]} ${d.getDate()} ${mois[d.getMonth()]} ${d.getFullYear()}`;
  }

  function formatDateShort(dateStr) {
    const d = new Date(dateStr + 'T12:00:00');
    const mois = ['jan.','fév.','mars','avr.','mai','juin',
                  'juil.','août','sept.','oct.','nov.','déc.'];
    return `${d.getDate()} ${mois[d.getMonth()]} ${d.getFullYear()}`;
  }

  function today() {
    return new Date().toLocaleDateString('sv-SE'); // "2026-04-09"
  }

  // ── Dateline ───────────────────────────────────
  function renderDateline() {
    const d     = new Date();
    const jours = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
    const mois  = ['janvier','février','mars','avril','mai','juin',
                   'juillet','août','septembre','octobre','novembre','décembre'];
    document.getElementById('dateline').textContent =
      `${jours[d.getDay()]} ${d.getDate()} ${mois[d.getMonth()]} ${d.getFullYear()}`;
  }

  // ── Hero ───────────────────────────────────────
  function renderHero(briefs) {
    const t         = today();
    const hasToday  = briefs.length > 0 && briefs[0] === t;
    const dateEl    = document.getElementById('hero-date');
    const ctaEl     = document.getElementById('hero-cta');
    const statusEl  = document.getElementById('hero-status');

    dateEl.textContent = formatDateFR(t);

    if (hasToday) {
      ctaEl.href      = BASE + t + '.html';
      ctaEl.textContent = 'Lire le brief →';
      ctaEl.classList.remove('unavailable');
      ctaEl.onclick   = null;
      statusEl.innerHTML = `
        <div class="status-dot"></div>
        <span>Généré ce matin à 06h00</span>`;
    } else {
      ctaEl.textContent = 'Disponible à 06h00';
      ctaEl.classList.add('unavailable');
      ctaEl.onclick = () => false;
      statusEl.innerHTML = `
        <div class="status-dot pending"></div>
        <span>Prochain brief généré automatiquement demain à 06h00</span>`;
    }
  }

  // ── Archive ────────────────────────────────────
  function renderArchive(briefs) {
    const t      = today();
    const past   = briefs.filter(b => b !== t);
    const shown  = past.slice(0, MAX_ARCHIVE);
    const listEl = document.getElementById('archive-list');
    const moreEl = document.getElementById('archive-more');

    if (shown.length === 0) {
      listEl.innerHTML = '<div class="archive-error">Aucune édition précédente.</div>';
      return;
    }

    listEl.innerHTML = shown.map(date => `
      <a class="archive-row" href="${BASE}${date}.html" target="_blank" rel="noopener">
        <span class="archive-row-date">${formatDateFR(date)}</span>
        <span class="archive-row-arrow">→</span>
      </a>
    `).join('');

    if (past.length > MAX_ARCHIVE) {
      moreEl.style.display = 'block';
    }
  }

  // ── Main ───────────────────────────────────────
  renderDateline();

  fetch(API)
    .then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    })
    .then(files => {
      const briefs = files
        .filter(f => /^\d{4}-\d{2}-\d{2}\.html$/.test(f.name))
        .map(f => f.name.replace('.html', ''))
        .sort()
        .reverse();

      renderHero(briefs);
      renderArchive(briefs);
    })
    .catch(err => {
      console.warn('API error:', err);
      const t = today();
      document.getElementById('hero-date').textContent = formatDateFR(t);
      const cta = document.getElementById('hero-cta');
      cta.href = BASE + t + '.html';
      cta.textContent = 'Lire le brief →';
      cta.classList.remove('unavailable');
      cta.onclick = null;
      document.getElementById('hero-status').innerHTML = `
        <div class="status-dot pending"></div>
        <span>Impossible de vérifier le statut</span>`;
      document.getElementById('archive-list').innerHTML =
        '<div class="archive-error">Impossible de charger les éditions précédentes.</div>';
    });
</script>
</body>
</html>
